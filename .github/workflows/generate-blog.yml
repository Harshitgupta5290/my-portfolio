name: Generate AI Blog Post

on:
  schedule:
    # Runs Mon, Wed, Fri at 9:00 AM UTC
    - cron: '0 9 * * 1,3,5'
  workflow_dispatch:
    inputs:
      topic_hint:
        description: 'Optional topic hint (e.g. "RAG systems", "microservices patterns")'
        required: false
        default: ''

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate blog post
        id: generate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TOPIC_HINT: ${{ github.event.inputs.topic_hint }}
        run: node scripts/generate-blog.js

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'blog: add AI-generated draft post'
          branch: blog/ai-draft-${{ github.run_id }}
          title: '📝 AI Blog Draft: ${{ env.BLOG_TITLE }}'
          body: |
            ## AI-Generated Blog Draft

            **Topic:** ${{ env.BLOG_TOPIC }}
            **Reading time:** ${{ env.READING_TIME }} min
            **Tags:** ${{ env.BLOG_TAGS }}

            ---

            ### Review Checklist
            - [ ] Read through the entire post
            - [ ] Edit for accuracy and personal voice
            - [ ] Check code snippets are correct
            - [ ] Verify all claims are accurate

            > AI-assisted draft, reviewed and approved by Harshit Gupta

            Merge this PR to publish the post to the portfolio.
          labels: blog-draft
          draft: false
